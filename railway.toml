[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.api"

[deploy]
# Runs migrations before traffic is switched to the new deployment.
# If this exits non-zero, Railway rolls back automatically.
releaseCommand = "dotnet SolaHub.API.dll --migrate"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
