name: Tauri Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.5)'
        required: true
        default: 'v0.1.5'

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  R2_PUBLIC_BASE: 'https://pub-c5a5d4bded77499abee30a6e8fd383b8.r2.dev'
  R2_BUCKET: 'solahub-downloads'
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-macos:
    name: macOS (${{ matrix.label }})
    runs-on: [self-hosted, macOS, ARM64]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64-apple-darwin
            label: Apple Silicon
            artifact_label: aarch64
          - arch: x86_64-apple-darwin
            label: Intel
            artifact_label: x64

    steps:
      - uses: actions/checkout@v4

      - name: Verify checkout
        run: |
          echo "=== Build info ==="
          echo "Tag:    ${{ env.RELEASE_TAG }}"
          echo "Commit: $(git rev-parse HEAD)"
          echo "Subject: $(git log -1 --format='%s')"
          VERSION=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          echo "App version in tauri.conf.json: $VERSION"
          EXPECTED="${{ env.RELEASE_TAG }}"
          EXPECTED="${EXPECTED#v}"
          if [ "$VERSION" != "$EXPECTED" ]; then
            echo "::error::tauri.conf.json version ($VERSION) does not match tag (${{ env.RELEASE_TAG }})"
            exit 1
          fi
          echo "✓ Version matches tag"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      - name: Inject updater config
        run: |
          python3 << 'EOF'
          import json, os
          pubkey = os.environ.get('SOLAHUB_UPDATER_PUBLIC_KEY', '').strip()
          if not pubkey:
              print("SOLAHUB_UPDATER_PUBLIC_KEY not set — skipping updater config injection")
          else:
              with open('src-tauri/tauri.conf.json') as f:
                  config = json.load(f)
              config.setdefault('plugins', {})['updater'] = {
                  'pubkey': pubkey,
                  'endpoints': [os.environ['R2_PUBLIC_BASE'] + '/latest.json']
              }
              with open('src-tauri/tauri.conf.json', 'w') as f:
                  json.dump(config, f, indent=2)
              print(f"Injected updater config with pubkey ending ...{pubkey[-8:]}")
          EOF
        env:
          SOLAHUB_UPDATER_PUBLIC_KEY: ${{ secrets.SOLAHUB_UPDATER_PUBLIC_KEY }}

      - name: Build & sign Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
          SOLAHUB_UPDATER_PUBLIC_KEY: ${{ secrets.SOLAHUB_UPDATER_PUBLIC_KEY }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: SolaHub ${{ env.RELEASE_TAG }}
          releaseBody: |
            ## What's new
            See the [changelog](https://github.com/alvslovescyber/SolaHub/blob/main/CHANGELOG.md) for details.

            ### Download
            - **macOS Apple Silicon** — `SolaHub_*_aarch64.dmg`
            - **macOS Intel** — `SolaHub_*_x64.dmg`
            - **Windows** — `SolaHub_*_x64-setup.exe`
          releaseDraft: false
          prerelease: true
          args: --target ${{ matrix.arch }}
          includeUpdaterJson: false

      # Tauri sometimes skips signing silently when the key is valid but the updater
      # bundle format has changed between minor releases. Sign explicitly as a fallback.
      - name: Sign updater archive (fallback)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: |
          ARCHIVE=$(find src-tauri/target/${{ matrix.arch }}/release/bundle/macos \
            -name "*.app.tar.gz" ! -name "*.sig" 2>/dev/null | head -1)
          [ -z "$ARCHIVE" ] || [ ! -f "$ARCHIVE" ] && { echo "No archive to sign"; exit 0; }
          [ -f "${ARCHIVE}.sig" ] && { echo "Signature already present"; exit 0; }
          [ -z "$TAURI_SIGNING_PRIVATE_KEY" ] && { echo "::error::TAURI_SIGNING_PRIVATE_KEY not set — cannot produce .sig"; exit 1; }
          echo "Signing $ARCHIVE explicitly (Tauri did not sign during build)..."
          npx @tauri-apps/cli signer sign "$ARCHIVE" \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password ""
          [ -f "${ARCHIVE}.sig" ] && echo "✓ Signature generated" || { echo "::error::signing did not produce .sig — check TAURI_SIGNING_PRIVATE_KEY format"; exit 1; }

      # Upload deterministic updater artifacts so latest.json can point at stable names.
      # We rename the files before upload to avoid relying on the `#display-name` gh CLI
      # syntax, which silently misbehaves when --clobber replaces an existing asset.
      - name: Upload updater archive and .sig to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ env.RELEASE_TAG }}
          LABEL=${{ matrix.artifact_label }}
          ARCHIVE=$(find src-tauri/target/${{ matrix.arch }}/release/bundle/macos \
            -name "*.app.tar.gz" ! -name "*.sig" 2>/dev/null | head -1)
          SIG=$(find src-tauri/target/${{ matrix.arch }}/release/bundle/macos \
            -name "*.app.tar.gz.sig" 2>/dev/null | head -1)
          if [ -z "$ARCHIVE" ] || [ ! -f "$ARCHIVE" ]; then
            echo "No updater archive found for $LABEL"
            exit 1
          fi
          if [ -z "$SIG" ] || [ ! -f "$SIG" ]; then
            echo "No updater signature found for $LABEL"
            exit 1
          fi
          UPLOAD_DIR=$(mktemp -d)
          cp "$ARCHIVE" "$UPLOAD_DIR/SolaHub_${LABEL}.app.tar.gz"
          cp "$SIG"     "$UPLOAD_DIR/SolaHub_${LABEL}.app.tar.gz.sig"
          gh release upload "$TAG" "$UPLOAD_DIR/SolaHub_${LABEL}.app.tar.gz" \
            --repo ${{ github.repository }} --clobber
          gh release upload "$TAG" "$UPLOAD_DIR/SolaHub_${LABEL}.app.tar.gz.sig" \
            --repo ${{ github.repository }} --clobber
          echo "Uploaded SolaHub_${LABEL}.app.tar.gz and SolaHub_${LABEL}.app.tar.gz.sig"

  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      - name: Inject updater config
        shell: python {0}
        run: |
          import json, os
          pubkey = os.environ.get('SOLAHUB_UPDATER_PUBLIC_KEY', '').strip()
          if not pubkey:
              print("SOLAHUB_UPDATER_PUBLIC_KEY not set — skipping updater config injection")
          else:
              with open('src-tauri/tauri.conf.json') as f:
                  config = json.load(f)
              config.setdefault('plugins', {})['updater'] = {
                  'pubkey': pubkey,
                  'endpoints': [os.environ['R2_PUBLIC_BASE'] + '/latest.json']
              }
              with open('src-tauri/tauri.conf.json', 'w') as f:
                  json.dump(config, f, indent=2)
              print(f"Injected updater config with pubkey ending ...{pubkey[-8:]}")
        env:
          SOLAHUB_UPDATER_PUBLIC_KEY: ${{ secrets.SOLAHUB_UPDATER_PUBLIC_KEY }}

      - name: Build & sign Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
          SOLAHUB_UPDATER_PUBLIC_KEY: ${{ secrets.SOLAHUB_UPDATER_PUBLIC_KEY }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: SolaHub ${{ env.RELEASE_TAG }}
          releaseBody: |
            ## What's new
            See the [changelog](https://github.com/alvslovescyber/SolaHub/blob/main/CHANGELOG.md) for details.
          releaseDraft: false
          prerelease: true
          includeUpdaterJson: false

      # List NSIS bundle output so failures are easy to diagnose.
      - name: List NSIS bundle directory
        shell: bash
        run: |
          echo "=== src-tauri/target/release/bundle/nsis/ ==="
          ls -lh src-tauri/target/release/bundle/nsis/ 2>/dev/null || echo "(directory not found)"

      # Sign NSIS zip explicitly if Tauri build skipped signing.
      - name: Sign updater NSIS zip (fallback)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        shell: bash
        run: |
          TAG=${{ env.RELEASE_TAG }}
          VERSION=${TAG#v}
          NSIS_DIR="src-tauri/target/release/bundle/nsis"
          # Prefer the explicit versioned path; fall back to shell glob.
          NSIS_ZIP="${NSIS_DIR}/SolaHub_${VERSION}_x64-setup.nsis.zip"
          if [ ! -f "$NSIS_ZIP" ]; then
            # || true: ls returns 2 when the glob finds no files; prevent set -e from aborting
            NSIS_ZIP=$(ls "${NSIS_DIR}"/*.nsis.zip 2>/dev/null | head -1) || true
          fi
          if [ -z "$NSIS_ZIP" ] || [ ! -f "$NSIS_ZIP" ]; then
            echo "No NSIS zip found — skipping fallback signing"
            exit 0
          fi
          if [ -f "${NSIS_ZIP}.sig" ]; then
            echo "Signature already present at ${NSIS_ZIP}.sig"
            exit 0
          fi
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY not set — cannot produce .sig"
            exit 1
          fi
          echo "Signing $NSIS_ZIP explicitly..."
          npx @tauri-apps/cli signer sign "$NSIS_ZIP" \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password ""
          if [ -f "${NSIS_ZIP}.sig" ]; then
            echo "✓ Signature generated"
          else
            echo "::error::signing did not produce .sig — check TAURI_SIGNING_PRIVATE_KEY format"
            exit 1
          fi

      # Upload the NSIS zip (Windows updater binary) and its .sig —
      # tauri-action only uploads the plain .exe, not the updater zip.
      - name: Upload updater NSIS zip and .sig to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG=${{ env.RELEASE_TAG }}
          VERSION=${TAG#v}
          NSIS_DIR="src-tauri/target/release/bundle/nsis"
          NSIS_ZIP="${NSIS_DIR}/SolaHub_${VERSION}_x64-setup.nsis.zip"
          if [ ! -f "$NSIS_ZIP" ]; then
            NSIS_ZIP=$(ls "${NSIS_DIR}"/*.nsis.zip 2>/dev/null | head -1)
          fi
          NSIS_SIG="${NSIS_ZIP}.sig"
          if [ -z "$NSIS_ZIP" ] || [ ! -f "$NSIS_ZIP" ] || [ ! -f "$NSIS_SIG" ]; then
            echo "::error::NSIS zip or sig not found — build was not signed"
            echo "  NSIS_ZIP=${NSIS_ZIP}"
            echo "  NSIS_SIG=${NSIS_SIG}"
            exit 1
          fi
          gh release upload "$TAG" "$NSIS_ZIP" "$NSIS_SIG" \
            --repo ${{ github.repository }} --clobber
          echo "Uploaded $(basename "$NSIS_ZIP") and .sig"

  publish-r2:
    name: Publish update artifacts to R2
    needs: [build-macos, build-windows]
    if: always() && needs.build-macos.result == 'success'
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ env.RELEASE_TAG }}
          mkdir -p ./dist
          gh release download "$TAG" \
            --repo ${{ github.repository }} \
            --pattern "*.sig" \
            --pattern "*.nsis.zip" \
            --pattern "*.app.tar.gz" \
            --pattern "*.dmg" \
            --pattern "*-setup.exe" \
            --pattern "*.msi" \
            --dir ./dist
          echo "--- Downloaded ---"
          ls -lh ./dist/

      # Upload all installer binaries first so they exist before latest.json goes live
      - name: Upload binaries to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd dist
          for file in *.nsis.zip *.nsis.zip.sig *.app.tar.gz *.app.tar.gz.sig *.dmg *-setup.exe *.msi; do
            [ -f "$file" ] || continue
            echo "Uploading $file ..."
            npx wrangler r2 object put "${{ env.R2_BUCKET }}/$file" \
              --file "$file" \
              --content-type "application/octet-stream" \
              --remote
          done

      # Build latest.json ourselves from the .sig files.
      # --windows-optional: publish macOS-only latest.json if Windows build failed.
      - name: Build latest.json from signatures
        run: |
          python3 scripts/generate-tauri-latest-json.py \
            --dist dist \
            --tag "${TAG}" \
            --r2-base "${R2_PUBLIC_BASE}" \
            --output dist/latest.json \
            --windows-optional
        env:
          R2_PUBLIC_BASE: ${{ env.R2_PUBLIC_BASE }}
          TAG: ${{ env.RELEASE_TAG }}

      # latest.json goes live last — once published, users will be offered the update
      - name: Publish latest.json to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler r2 object put "${{ env.R2_BUCKET }}/latest.json" \
            --file dist/latest.json \
            --content-type "application/json" \
            --remote
          echo "✅ latest.json live at ${{ env.R2_PUBLIC_BASE }}/latest.json"

      - name: Publish downloads page to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          TAG=${{ env.RELEASE_TAG }}
          VERSION=${TAG#v}
          sed "s/__VERSION__/${VERSION}/g" scripts/downloads.template.html > dist/downloads.html
          npx wrangler r2 object put "${{ env.R2_BUCKET }}/downloads.html" \
            --file dist/downloads.html \
            --content-type "text/html; charset=utf-8" \
            --remote
          echo "✅ downloads.html live at ${{ env.R2_PUBLIC_BASE }}/downloads.html (v${VERSION})"
