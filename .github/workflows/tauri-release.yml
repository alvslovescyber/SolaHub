name: Tauri Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.5)'
        required: true
        default: 'v0.1.5'

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  R2_PUBLIC_BASE: 'https://pub-c5a5d4bded77499abee30a6e8fd383b8.r2.dev'
  R2_BUCKET: 'solahub-downloads'
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-macos:
    name: macOS (${{ matrix.label }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64-apple-darwin
            label: Apple Silicon
            artifact_label: aarch64
          - arch: x86_64-apple-darwin
            label: Intel
            artifact_label: x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      - name: Inject updater config
        run: |
          python3 << 'EOF'
          import json, os
          pubkey = os.environ.get('SOLAHUB_UPDATER_PUBLIC_KEY', '').strip()
          if not pubkey:
              print("SOLAHUB_UPDATER_PUBLIC_KEY not set — skipping updater config injection")
          else:
              with open('src-tauri/tauri.conf.json') as f:
                  config = json.load(f)
              config.setdefault('plugins', {})['updater'] = {
                  'pubkey': pubkey,
                  'endpoints': [os.environ['R2_PUBLIC_BASE'] + '/latest.json']
              }
              with open('src-tauri/tauri.conf.json', 'w') as f:
                  json.dump(config, f, indent=2)
              print(f"Injected updater config with pubkey ending ...{pubkey[-8:]}")
          EOF
        env:
          SOLAHUB_UPDATER_PUBLIC_KEY: ${{ secrets.SOLAHUB_UPDATER_PUBLIC_KEY }}

      - name: Build & sign Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
          SOLAHUB_UPDATER_PUBLIC_KEY: ${{ secrets.SOLAHUB_UPDATER_PUBLIC_KEY }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: SolaHub ${{ env.RELEASE_TAG }}
          releaseBody: |
            ## What's new
            See the [changelog](https://github.com/alvslovescyber/SolaHub/blob/main/CHANGELOG.md) for details.

            ### Download
            - **macOS Apple Silicon** — `SolaHub_*_aarch64.dmg`
            - **macOS Intel** — `SolaHub_*_x64.dmg`
            - **Windows** — `SolaHub_*_x64-setup.exe`
          releaseDraft: false
          prerelease: true
          args: --target ${{ matrix.arch }}
          includeUpdaterJson: false

      # Tauri sometimes skips signing silently when the key is valid but the updater
      # bundle format has changed between minor releases. Sign explicitly as a fallback.
      - name: Sign updater archive (fallback)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: |
          ARCHIVE=$(find src-tauri/target/${{ matrix.arch }}/release/bundle/macos \
            -name "*.app.tar.gz" ! -name "*.sig" 2>/dev/null | head -1)
          [ -z "$ARCHIVE" ] || [ ! -f "$ARCHIVE" ] && { echo "No archive to sign"; exit 0; }
          [ -f "${ARCHIVE}.sig" ] && { echo "Signature already present"; exit 0; }
          [ -z "$TAURI_SIGNING_PRIVATE_KEY" ] && { echo "::error::TAURI_SIGNING_PRIVATE_KEY not set — cannot produce .sig"; exit 1; }
          echo "Signing $ARCHIVE explicitly (Tauri did not sign during build)..."
          npx @tauri-apps/cli signer sign "$ARCHIVE" \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password ""
          [ -f "${ARCHIVE}.sig" ] && echo "✓ Signature generated" || { echo "::error::signing did not produce .sig — check TAURI_SIGNING_PRIVATE_KEY format"; exit 1; }

      # Upload deterministic updater artifacts so latest.json can point at stable names.
      - name: Upload updater archive and .sig to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ env.RELEASE_TAG }}
          LABEL=${{ matrix.artifact_label }}
          ARCHIVE=$(find src-tauri/target/${{ matrix.arch }}/release/bundle/macos \
            -name "*.app.tar.gz" ! -name "*.sig" 2>/dev/null | head -1)
          SIG=$(find src-tauri/target/${{ matrix.arch }}/release/bundle/macos \
            -name "*.app.tar.gz.sig" 2>/dev/null | head -1)
          if [ -z "$ARCHIVE" ] || [ ! -f "$ARCHIVE" ]; then
            echo "No updater archive found for $LABEL"
            exit 1
          fi
          if [ -z "$SIG" ] || [ ! -f "$SIG" ]; then
            echo "No updater signature found for $LABEL"
            exit 1
          fi
          gh release upload "$TAG" \
            "${ARCHIVE}#SolaHub_${LABEL}.app.tar.gz" \
            "${SIG}#SolaHub_${LABEL}.app.tar.gz.sig" \
            --repo ${{ github.repository }} --clobber
          echo "Uploaded SolaHub_${LABEL}.app.tar.gz and signature"

  build-windows:
    name: Windows (x64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      - name: Inject updater config
        shell: python {0}
        run: |
          import json, os
          pubkey = os.environ.get('SOLAHUB_UPDATER_PUBLIC_KEY', '').strip()
          if not pubkey:
              print("SOLAHUB_UPDATER_PUBLIC_KEY not set — skipping updater config injection")
          else:
              with open('src-tauri/tauri.conf.json') as f:
                  config = json.load(f)
              config.setdefault('plugins', {})['updater'] = {
                  'pubkey': pubkey,
                  'endpoints': [os.environ['R2_PUBLIC_BASE'] + '/latest.json']
              }
              with open('src-tauri/tauri.conf.json', 'w') as f:
                  json.dump(config, f, indent=2)
              print(f"Injected updater config with pubkey ending ...{pubkey[-8:]}")
        env:
          SOLAHUB_UPDATER_PUBLIC_KEY: ${{ secrets.SOLAHUB_UPDATER_PUBLIC_KEY }}

      - name: Build & sign Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
          SOLAHUB_UPDATER_PUBLIC_KEY: ${{ secrets.SOLAHUB_UPDATER_PUBLIC_KEY }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: SolaHub ${{ env.RELEASE_TAG }}
          releaseBody: |
            ## What's new
            See the [changelog](https://github.com/alvslovescyber/SolaHub/blob/main/CHANGELOG.md) for details.
          releaseDraft: false
          prerelease: true
          includeUpdaterJson: false

      # Sign NSIS zip explicitly if Tauri build skipped signing.
      - name: Sign updater NSIS zip (fallback)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        shell: bash
        run: |
          NSIS_ZIP=$(find src-tauri/target/release/bundle/nsis \
            -name "*.nsis.zip" 2>/dev/null | head -1)
          [ -z "$NSIS_ZIP" ] || [ ! -f "$NSIS_ZIP" ] && { echo "No NSIS zip to sign"; exit 0; }
          [ -f "${NSIS_ZIP}.sig" ] && { echo "Signature already present"; exit 0; }
          [ -z "$TAURI_SIGNING_PRIVATE_KEY" ] && { echo "::error::TAURI_SIGNING_PRIVATE_KEY not set — cannot produce .sig"; exit 1; }
          echo "Signing $NSIS_ZIP explicitly..."
          npx @tauri-apps/cli signer sign "$NSIS_ZIP" \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password ""
          [ -f "${NSIS_ZIP}.sig" ] && echo "✓ Signature generated" || { echo "::error::signing did not produce .sig — check TAURI_SIGNING_PRIVATE_KEY format"; exit 1; }

      # Upload the NSIS zip (Windows updater binary) and its .sig —
      # tauri-action only uploads the plain .exe, not the updater zip.
      - name: Upload updater NSIS zip and .sig to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG=${{ env.RELEASE_TAG }}
          NSIS_ZIP=$(find src-tauri/target/release/bundle/nsis \
            -name "*.nsis.zip" 2>/dev/null | head -1)
          NSIS_SIG=$(find src-tauri/target/release/bundle/nsis \
            -name "*.nsis.zip.sig" 2>/dev/null | head -1)
          if [ -n "$NSIS_ZIP" ] && [ -f "$NSIS_ZIP" ] && [ -n "$NSIS_SIG" ]; then
            gh release upload "$TAG" "$NSIS_ZIP" "$NSIS_SIG" \
              --repo ${{ github.repository }} --clobber
            echo "Uploaded $(basename "$NSIS_ZIP") and .sig"
          else
            echo "No NSIS zip/sig found — build was not signed"
            exit 1
          fi

  publish-r2:
    name: Publish update artifacts to R2
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ env.RELEASE_TAG }}
          mkdir -p ./dist
          gh release download "$TAG" \
            --repo ${{ github.repository }} \
            --pattern "*.sig" \
            --pattern "*.nsis.zip" \
            --pattern "*.app.tar.gz" \
            --pattern "*.dmg" \
            --pattern "*-setup.exe" \
            --pattern "*.msi" \
            --dir ./dist
          echo "--- Downloaded ---"
          ls -lh ./dist/

      # Upload all installer binaries first so they exist before latest.json goes live
      - name: Upload binaries to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd dist
          for file in *.nsis.zip *.nsis.zip.sig *.app.tar.gz *.app.tar.gz.sig *.dmg *-setup.exe *.msi; do
            [ -f "$file" ] || continue
            echo "Uploading $file ..."
            npx wrangler r2 object put "${{ env.R2_BUCKET }}/$file" \
              --file "$file" \
              --content-type "application/octet-stream" \
              --remote
          done

      # Build latest.json ourselves from the .sig files.
      - name: Build latest.json from signatures
        run: |
          python3 scripts/generate-tauri-latest-json.py \
            --dist dist \
            --tag "${TAG}" \
            --r2-base "${R2_PUBLIC_BASE}" \
            --output dist/latest.json
        env:
          R2_PUBLIC_BASE: ${{ env.R2_PUBLIC_BASE }}
          TAG: ${{ env.RELEASE_TAG }}

      # latest.json goes live last — once published, users will be offered the update
      - name: Publish latest.json to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler r2 object put "${{ env.R2_BUCKET }}/latest.json" \
            --file dist/latest.json \
            --content-type "application/json" \
            --remote
          echo "✅ latest.json live at ${{ env.R2_PUBLIC_BASE }}/latest.json"

      - name: Publish downloads page to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          TAG=${{ env.RELEASE_TAG }}
          VERSION=${TAG#v}
          sed "s/__VERSION__/${VERSION}/g" scripts/downloads.template.html > dist/downloads.html
          npx wrangler r2 object put "${{ env.R2_BUCKET }}/downloads.html" \
            --file dist/downloads.html \
            --content-type "text/html; charset=utf-8" \
            --remote
          echo "✅ downloads.html live at ${{ env.R2_PUBLIC_BASE }}/downloads.html (v${VERSION})"
