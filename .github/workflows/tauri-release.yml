name: Tauri Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.5)'
        required: true
        default: 'v0.1.5'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  R2_PUBLIC_BASE: 'https://pub-c5a5d4bded77499abee30a6e8fd383b8.r2.dev'
  R2_BUCKET: 'solahub-downloads'
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    name: macOS (${{ matrix.label }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64-apple-darwin
            label: Apple Silicon
            artifact_label: aarch64
          - arch: x86_64-apple-darwin
            label: Intel
            artifact_label: x64

    steps:
      - uses: actions/checkout@v4

      - name: Verify checkout
        run: |
          echo "=== Build info ==="
          echo "Tag:    ${{ env.RELEASE_TAG }}"
          echo "Commit: $(git rev-parse HEAD)"
          echo "Subject: $(git log -1 --format='%s')"
          VERSION=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          echo "App version in tauri.conf.json: $VERSION"
          EXPECTED="${{ env.RELEASE_TAG }}"
          EXPECTED="${EXPECTED#v}"
          if [ "$VERSION" != "$EXPECTED" ]; then
            echo "::error::tauri.conf.json version ($VERSION) does not match tag (${{ env.RELEASE_TAG }})"
            exit 1
          fi
          echo "✓ Version matches tag"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      - name: Inject updater config
        run: python3 scripts/inject-updater-config.py
        env:
          SOLAHUB_UPDATER_PUBLIC_KEY: ${{ secrets.SOLAHUB_UPDATER_PUBLIC_KEY }}
          R2_PUBLIC_BASE: ${{ env.R2_PUBLIC_BASE }}

      - name: Build & sign Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
          SOLAHUB_UPDATER_PUBLIC_KEY: ${{ secrets.SOLAHUB_UPDATER_PUBLIC_KEY }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: SolaHub ${{ env.RELEASE_TAG }}
          releaseBody: |
            ## What's new
            See the [changelog](https://github.com/alvslovescyber/SolaHub/blob/main/CHANGELOG.md) for details.

            ### Download
            - **macOS Apple Silicon** — `SolaHub_*_aarch64.dmg`
            - **macOS Intel** — `SolaHub_*_x64.dmg`
            - **Windows** — `SolaHub_*_x64-setup.exe`
          releaseDraft: false
          prerelease: true
          args: --target ${{ matrix.arch }}
          includeUpdaterJson: false

      # Tauri sometimes skips signing silently when the key is valid but the updater
      # bundle format has changed between minor releases. Sign explicitly as a fallback.
      - name: Sign updater archive (fallback)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: |
          ARCHIVE=$(find src-tauri/target/${{ matrix.arch }}/release/bundle/macos \
            -name "*.app.tar.gz" ! -name "*.sig" 2>/dev/null | head -1)
          [ -z "$ARCHIVE" ] || [ ! -f "$ARCHIVE" ] && { echo "No archive to sign"; exit 0; }
          [ -f "${ARCHIVE}.sig" ] && { echo "Signature already present"; exit 0; }
          [ -z "$TAURI_SIGNING_PRIVATE_KEY" ] && { echo "::error::TAURI_SIGNING_PRIVATE_KEY not set — cannot produce .sig"; exit 1; }
          echo "Signing $ARCHIVE explicitly (Tauri did not sign during build)..."
          npx @tauri-apps/cli signer sign "$ARCHIVE" \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password ""
          [ -f "${ARCHIVE}.sig" ] && echo "✓ Signature generated" || { echo "::error::signing did not produce .sig — check TAURI_SIGNING_PRIVATE_KEY format"; exit 1; }

      - name: Upload updater archive and .sig to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ env.RELEASE_TAG }}
          LABEL=${{ matrix.artifact_label }}
          ARCHIVE=$(find src-tauri/target/${{ matrix.arch }}/release/bundle/macos \
            -name "*.app.tar.gz" ! -name "*.sig" 2>/dev/null | head -1)
          SIG=$(find src-tauri/target/${{ matrix.arch }}/release/bundle/macos \
            -name "*.app.tar.gz.sig" 2>/dev/null | head -1)
          if [ -z "$ARCHIVE" ] || [ ! -f "$ARCHIVE" ]; then
            echo "No updater archive found for $LABEL"
            exit 1
          fi
          if [ -z "$SIG" ] || [ ! -f "$SIG" ]; then
            echo "No updater signature found for $LABEL"
            exit 1
          fi
          UPLOAD_DIR=$(mktemp -d)
          cp "$ARCHIVE" "$UPLOAD_DIR/SolaHub_${LABEL}.app.tar.gz"
          cp "$SIG"     "$UPLOAD_DIR/SolaHub_${LABEL}.app.tar.gz.sig"
          gh release upload "$TAG" "$UPLOAD_DIR/SolaHub_${LABEL}.app.tar.gz" \
            --repo ${{ github.repository }} --clobber
          gh release upload "$TAG" "$UPLOAD_DIR/SolaHub_${LABEL}.app.tar.gz.sig" \
            --repo ${{ github.repository }} --clobber
          echo "Uploaded SolaHub_${LABEL}.app.tar.gz and SolaHub_${LABEL}.app.tar.gz.sig"

  build-windows:
    name: Windows (x64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify checkout
        shell: bash
        run: |
          echo "=== Build info ==="
          echo "Tag:    ${{ env.RELEASE_TAG }}"
          echo "Commit: $(git rev-parse HEAD)"
          echo "Subject: $(git log -1 --format='%s')"
          VERSION=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          echo "App version in tauri.conf.json: $VERSION"
          EXPECTED="${{ env.RELEASE_TAG }}"
          EXPECTED="${EXPECTED#v}"
          if [ "$VERSION" != "$EXPECTED" ]; then
            echo "::error::tauri.conf.json version ($VERSION) does not match tag (${{ env.RELEASE_TAG }})"
            exit 1
          fi
          echo "✓ Version matches tag"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      - name: Inject updater config
        shell: bash
        run: python3 scripts/inject-updater-config.py
        env:
          SOLAHUB_UPDATER_PUBLIC_KEY: ${{ secrets.SOLAHUB_UPDATER_PUBLIC_KEY }}
          R2_PUBLIC_BASE: ${{ env.R2_PUBLIC_BASE }}

      - name: Build & sign Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
          SOLAHUB_UPDATER_PUBLIC_KEY: ${{ secrets.SOLAHUB_UPDATER_PUBLIC_KEY }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: SolaHub ${{ env.RELEASE_TAG }}
          releaseBody: |
            ## What's new
            See the [changelog](https://github.com/alvslovescyber/SolaHub/blob/main/CHANGELOG.md) for details.

            ### Download
            - **macOS Apple Silicon** — `SolaHub_*_aarch64.dmg`
            - **macOS Intel** — `SolaHub_*_x64.dmg`
            - **Windows** — `SolaHub_*_x64-setup.exe`
          releaseDraft: false
          prerelease: true
          args: --target x86_64-pc-windows-msvc
          includeUpdaterJson: false

      - name: Upload updater archive and .sig to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ env.RELEASE_TAG }}
          BUNDLE_DIR="src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"
          ARCHIVE=$(find "$BUNDLE_DIR" -name "*.nsis.zip" ! -name "*.sig" 2>/dev/null | head -1)
          SIG=$(find "$BUNDLE_DIR" -name "*.nsis.zip.sig" 2>/dev/null | head -1)
          if [ -z "$ARCHIVE" ] || [ ! -f "$ARCHIVE" ]; then
            echo "No updater archive found"
            exit 1
          fi
          if [ -z "$SIG" ] || [ ! -f "$SIG" ]; then
            echo "No updater signature found"
            exit 1
          fi
          UPLOAD_DIR=$(mktemp -d)
          cp "$ARCHIVE" "$UPLOAD_DIR/SolaHub_x64.nsis.zip"
          cp "$SIG"     "$UPLOAD_DIR/SolaHub_x64.nsis.zip.sig"
          gh release upload "$TAG" "$UPLOAD_DIR/SolaHub_x64.nsis.zip" \
            --repo ${{ github.repository }} --clobber
          gh release upload "$TAG" "$UPLOAD_DIR/SolaHub_x64.nsis.zip.sig" \
            --repo ${{ github.repository }} --clobber
          echo "Uploaded SolaHub_x64.nsis.zip and SolaHub_x64.nsis.zip.sig"

  publish-r2:
    name: Publish update artifacts to R2
    needs: [build-macos, build-windows]
    if: always() && needs.build-macos.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ env.RELEASE_TAG }}
          mkdir -p ./dist
          # Download only the fixed-name updater artifacts (no version prefix) plus
          # the version-named installers for the downloads page.
          # Deliberately exclude version-named *.nsis.zip.sig files — they duplicate
          # the SolaHub_x64.nsis.zip.sig we upload explicitly, causing generate-tauri-latest-json.py
          # to find multiple *.nsis.zip.sig matches and exit with an error.
          gh release download "$TAG" \
            --repo ${{ github.repository }} \
            --pattern "SolaHub_aarch64.app.tar.gz" \
            --pattern "SolaHub_aarch64.app.tar.gz.sig" \
            --pattern "SolaHub_x64.app.tar.gz" \
            --pattern "SolaHub_x64.app.tar.gz.sig" \
            --pattern "SolaHub_x64.nsis.zip" \
            --pattern "SolaHub_x64.nsis.zip.sig" \
            --pattern "*.dmg" \
            --pattern "*-setup.exe" \
            --dir ./dist
          echo "--- Downloaded ---"
          ls -lh ./dist/

      - name: Upload binaries to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd dist
          for file in *.nsis.zip *.nsis.zip.sig *.app.tar.gz *.app.tar.gz.sig *.dmg *-setup.exe *.msi; do
            [ -f "$file" ] || continue
            echo "Uploading $file ..."
            npx wrangler r2 object put "${{ env.R2_BUCKET }}/$file" \
              --file "$file" \
              --content-type "application/octet-stream" \
              --remote
          done

      - name: Build latest.json from signatures
        run: |
          python3 scripts/generate-tauri-latest-json.py \
            --dist dist \
            --tag "${TAG}" \
            --r2-base "${R2_PUBLIC_BASE}" \
            --output dist/latest.json \
            --windows-optional
        env:
          R2_PUBLIC_BASE: ${{ env.R2_PUBLIC_BASE }}
          TAG: ${{ env.RELEASE_TAG }}

      - name: Publish latest.json to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler r2 object put "${{ env.R2_BUCKET }}/latest.json" \
            --file dist/latest.json \
            --content-type "application/json" \
            --remote
          echo "✅ latest.json live at ${{ env.R2_PUBLIC_BASE }}/latest.json"

      - name: Publish downloads page to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_PUBLIC_BASE: ${{ env.R2_PUBLIC_BASE }}
        run: |
          TAG=${{ env.RELEASE_TAG }}
          VERSION=${TAG#v}
          sed -e "s/__MAC_VERSION__/${VERSION}/g" \
              -e "s/__WIN_VERSION__/${VERSION}/g" \
              scripts/downloads.template.html > dist/downloads.html
          npx wrangler r2 object put "${{ env.R2_BUCKET }}/downloads.html" \
            --file dist/downloads.html \
            --content-type "text/html; charset=utf-8" \
            --remote
          echo "✅ downloads.html live (v${VERSION})"

      - name: Clean up old versions from R2
        continue-on-error: true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python3 scripts/cleanup-r2.py --bucket ${{ env.R2_BUCKET }} --keep 2
