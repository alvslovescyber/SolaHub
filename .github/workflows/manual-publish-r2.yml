name: Manual Publish to R2

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.1.3)'
        required: true
        default: 'v0.1.3'

env:
  R2_PUBLIC_BASE: 'https://pub-c5a5d4bded77499abee30a6e8fd383b8.r2.dev'
  R2_BUCKET: 'solahub-downloads'

jobs:
  publish:
    name: Upload installers and downloads page to R2
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download release installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ inputs.tag }}
          gh release download "$TAG" \
            --repo ${{ github.repository }} \
            --pattern "*.dmg" \
            --pattern "*-setup.exe" \
            --pattern "*.msi" \
            --pattern "*.app.tar.gz" \
            --pattern "*.nsis.zip" \
            --dir ./dist
          echo "--- Downloaded ---"
          ls -lh ./dist/

      - name: Upload installers to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd dist
          for file in *.dmg *-setup.exe *.msi *.app.tar.gz *.nsis.zip; do
            [ -f "$file" ] || continue
            echo "Uploading $file ..."
            npx wrangler r2 object put "${{ env.R2_BUCKET }}/$file" \
              --file "$file" \
              --content-type "application/octet-stream" \
              --remote
          done

      - name: Generate and publish downloads page
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          TAG=${{ inputs.tag }}
          VERSION=${TAG#v}
          sed "s/__VERSION__/${VERSION}/g" scripts/downloads.template.html > dist/downloads.html
          npx wrangler r2 object put "${{ env.R2_BUCKET }}/downloads.html" \
            --file dist/downloads.html \
            --content-type "text/html; charset=utf-8" \
            --remote
          echo "✅ downloads.html live at ${{ env.R2_PUBLIC_BASE }}/downloads.html (v${VERSION})"
