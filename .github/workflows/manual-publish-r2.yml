name: Manual Publish to R2

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.1.5)'
        required: true
        default: 'v0.1.5'

env:
  R2_PUBLIC_BASE: 'https://pub-c5a5d4bded77499abee30a6e8fd383b8.r2.dev'
  R2_BUCKET: 'solahub-downloads'

jobs:
  publish:
    name: Upload installers, updater feed, and downloads page to R2
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ inputs.tag }}
          mkdir -p ./dist
          gh release download "$TAG" \
            --repo ${{ github.repository }} \
            --pattern "*.dmg" \
            --pattern "*-setup.exe" \
            --pattern "*.msi" \
            --pattern "*.app.tar.gz" \
            --pattern "*.nsis.zip" \
            --pattern "*.sig" \
            --dir ./dist
          echo "--- Downloaded ---"
          ls -lh ./dist/

      - name: Upload release artifacts to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd dist
          for file in *.dmg *-setup.exe *.msi *.app.tar.gz *.app.tar.gz.sig *.nsis.zip *.nsis.zip.sig; do
            [ -f "$file" ] || continue
            echo "Uploading $file ..."
            npx wrangler r2 object put "${{ env.R2_BUCKET }}/$file" \
              --file "$file" \
              --content-type "application/octet-stream" \
              --remote
          done

      - name: Build latest.json from signatures
        run: |
          python3 scripts/generate-tauri-latest-json.py \
            --dist dist \
            --tag "${TAG}" \
            --r2-base "${R2_PUBLIC_BASE}" \
            --output dist/latest.json
        env:
          R2_PUBLIC_BASE: ${{ env.R2_PUBLIC_BASE }}
          TAG: ${{ inputs.tag }}

      - name: Publish latest.json to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler r2 object put "${{ env.R2_BUCKET }}/latest.json" \
            --file dist/latest.json \
            --content-type "application/json" \
            --remote
          echo "✅ latest.json live at ${{ env.R2_PUBLIC_BASE }}/latest.json"

      - name: Generate and publish downloads page
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          TAG=${{ inputs.tag }}
          VERSION=${TAG#v}
          sed "s/__VERSION__/${VERSION}/g" scripts/downloads.template.html > dist/downloads.html
          npx wrangler r2 object put "${{ env.R2_BUCKET }}/downloads.html" \
            --file dist/downloads.html \
            --content-type "text/html; charset=utf-8" \
            --remote
          echo "✅ downloads.html live at ${{ env.R2_PUBLIC_BASE }}/downloads.html (v${VERSION})"
