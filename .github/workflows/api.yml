name: API CI

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/api.yml'
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/api.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Format, Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore api/SolaHub.sln

      - name: Format check (CSharpier)
        run: |
          dotnet tool restore --tool-manifest .config/dotnet-tools.json
          dotnet tool run csharpier check .
        working-directory: api

      - name: Build
        run: dotnet build api/SolaHub.sln --no-restore --configuration Release

      - name: Unit tests
        run: >
          dotnet test api/tests/SolaHub.Tests.Unit/SolaHub.Tests.Unit.csproj
          --no-build
          --configuration Release
          --logger trx

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: '**/TestResults/*.trx'
          retention-days: 7

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore api/SolaHub.sln

      - name: Build
        run: dotnet build api/SolaHub.sln --no-restore --configuration Release

      - name: Integration tests
        run: >
          dotnet test api/tests/SolaHub.Tests.Integration/SolaHub.Tests.Integration.csproj
          --no-build
          --configuration Release
          --logger trx
        env:
          ConnectionStrings__DefaultConnection: >-
            Host=localhost;Port=5432;Database=solahub_test;Username=solahub_app;Password=app-test-password
          ConnectionStrings__MigrationConnection: >-
            Host=localhost;Port=5432;Database=solahub_test;Username=test;Password=test
          Database__AppRolePassword: app-test-password
          Jwt__SecretKey: ci-secret-key-must-be-at-least-32-bytes-long!!
          Jwt__Issuer: SolaHub
          Jwt__Audience: SolaHub.Desktop

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: '**/TestResults/*.trx'
          retention-days: 7
